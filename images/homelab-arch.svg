<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400" role="img" aria-label="Homelab architecture diagram">
  <style>
    .box { fill:#fff; stroke:#0a66c2; stroke-width:2; rx:8; }
    .text { font-family: Rubik, Arial, sans-serif; font-size:14px; fill:#0b2a4a }
    .arrow { stroke:#0a66c2; stroke-width:2; fill:none; marker-end: url(#arrowhead); }
  </style>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#0a66c2" />
    </marker>
  </defs>

  <!-- Proxmox -->
  <rect class="box" x="50" y="50" width="180" height="80" />
  <text x="140" y="95" text-anchor="middle" class="text">Proxmox (VMs & CTs)</text>

  <!-- Home Assistant -->
  <rect class="box" x="280" y="40" width="160" height="60" />
  <text x="360" y="75" text-anchor="middle" class="text">Home Assistant</text>

  <!-- Docker / Services -->
  <rect class="box" x="280" y="130" width="160" height="60" />
  <text x="360" y="165" text-anchor="middle" class="text">Containers & Services</text>

  <!-- Ubiquiti -->
  <rect class="box" x="550" y="60" width="180" height="80" />
  <text x="640" y="95" text-anchor="middle" class="text">Ubiquiti (Network)</text>

  <!-- NAS -->
  <rect class="box" x="50" y="170" width="180" height="60" />
  <text x="140" y="205" text-anchor="middle" class="text">NAS / Backups</text>

  <!-- WireGuard -->
  <rect class="box" x="550" y="170" width="180" height="60" />
  <text x="640" y="205" text-anchor="middle" class="text">WireGuard VPN</text>

  <!-- arrows -->
  <path class="arrow" d="M230 90 L280 70" />
  <path class="arrow" d="M230 190 L280 160" />
  <path class="arrow" d="M440 70 L550 100" />
  <path class="arrow" d="M440 160 L550 190" />
  <path class="arrow" d="M140 170 L140 130" />

  <!-- labels -->
  <text x="200" y="32" class="text">Local Homelab Architecture</text>
</svg>
